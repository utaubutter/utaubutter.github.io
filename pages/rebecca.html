<!DOCTYPE html>

<head>

<main class="glass">

            <section class="info-row">
                <h2>Recording</h2>

                </div>

            <section class="buttons">
                <a href="#">
                    <span>Sample</span>
                    <small>追加予定</small>

                    <span>Download</span>
                    <small>追加予定</small>

        </div>

    </div>

    <section>

        <h2>Profile</h2>

        <p class="coming">
            追加予定
