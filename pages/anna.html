<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Himeya Anna — Butter</title>
    <link rel="stylesheet" href="../style-v2.css">
</head>
<body>

    <main class="glass">
        <a class="back" href="voicebank.html">← Voicebank</a>

<div class="character">
    <div class="character-image">
        <span>追加予定</span>
        <!-- 後で立ち絵を入れる -->
    </div>

    <div class="character-info">
        <h1>姫矢杏菜</h1>
        <p class="roman">Himeya Anna</p>

        <div class="info-row">
            <h2>Format</h2>
            <div class="info-value"><p>VCV</p><span>単音階連続音</span></div>
        </div>
        <div class="info-row">
            <h2>Recording</h2>
            <div class="info-value"><p>2019</p></div>
        </div>

        <section class="buttons">
            <a href="javascript:void(0);" id="sample-btn">
                <span>Sample</span>
            </a>
            <a href="#">
                <span>Download</span>
                <small>追加予定</small>
            </a>
        </section>

        <div class="mini-player" id="mini-player">
            <audio id="audio-player" src="../audio/anna-sample.mp3"></audio>
            <button class="player-btn" id="play-pause-btn">▶</button>
            <div class="player-info">
                <span class="player-title">Sample Voice</span>
                <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
            </div>
        </div>

    </div>
</div>

<section class="profile-section">
    <h2>Profile</h2>
    <p class="coming">追加予定</p>
</section>

<div class="character-links">
    <a href="../pages/guideline.html" class="text-link" target="_blank" rel="noopener noreferrer">Guideline</a>
    <a href="../pages/contact.html" class="text-link" target="_blank" rel="noopener noreferrer">Contact</a>
</div>
       
        <footer>
            © 2026 <a href="https://x.com/utaubutter" target="_blank" rel="noopener noreferrer">utaubutter</a>
        </footer>
        
    </main>

<script>
const sampleBtn = document.getElementById('sample-btn');
const miniPlayer = document.getElementById('mini-player');
const audio = document.getElementById('audio-player');
const playPauseBtn = document.getElementById('play-pause-btn');
const progressFill = document.getElementById('progress-fill');

// Sampleボタンを押した時の処理
sampleBtn.addEventListener('click', () => {
    // プレイヤーが隠れている場合は、表示する（自動再生はしない）
    if (miniPlayer.style.display === 'none' || miniPlayer.style.display === '') {
        miniPlayer.style.display = 'flex';
        playPauseBtn.textContent = '▶'; // 【修正】最初は停止状態なので再生マークにする
    } else {
        // すでに表示されている時にもう一度押したら、音を止めてプレイヤーを閉じる
        audio.pause();
        audio.currentTime = 0; 
        miniPlayer.style.display = 'none';
    }
});

playPauseBtn.addEventListener('click', () => {
    if (audio.paused) {
        audio.play();
        playPauseBtn.textContent = '⏸';
    } else {
        audio.pause();
        playPauseBtn.textContent = '▶';
    }
});

audio.addEventListener('timeupdate', () => {
    const progress = (audio.currentTime / audio.duration) * 100;
    progressFill.style.width = `${progress}%`;
});

audio.addEventListener('ended', () => {
    miniPlayer.style.display = 'none';
    progressFill.style.width = '0%';
});
</script>

</body>
</html>
