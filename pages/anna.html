<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Himeya Anna — Butter</title>
    <link rel="stylesheet" href="../style-v2.css">
</head>
<body>

    <main class="glass">
        <a class="back" href="voicebank.html">← Voicebank</a>
    
        <div class="character">
            <div class="character-image">
                <span>追加予定</span>
                <!-- 後で立ち絵を入れる -->
            </div>
        
            <div class="character-info">
                <h1>姫矢杏菜</h1>
                <p class="roman">Himeya Anna</p>

                <section class="info-row">
                    <h2>Format</h2>
                    <div class="info-value">
                        <p>VCV</p>
                        <span>単音階連続音</span>
                    </div>
                </section>
            
                <section class="info-row">
                    <h2>Recording</h2>
                    <div class="info-value">
                        <p>2019</p>
                    </div>
                </section>
            
                <section class="buttons">
                    <a href="javascript:void(0);" id="sample-btn">
                        <span>Sample</span>
                    </a>
                    
                    <div class="mini-player" id="mini-player">
                    <audio id="audio-player" src="../audio/sample.mp3"></audio> <!-- 音声ファイルのパス -->
                    <button class="player-btn" id="play-pause-btn">▶</button>
                    <div class="player-info">
                    <span class="player-title">Sample Voice</span>
                    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
                    </div>
                    </div>
                    
                    <a href="#">
                        <span>Download</span>
                        <small>追加予定</small>
                    </a>
                </section>
            </div>
        </div>
    
        <section class="profile-section">
            <h2>Profile</h2>
            <p class="coming">追加予定</p>
        </section>
    
        <div class="character-links">
            <a href="../pages/guideline.html" class="text-link" target="_blank" rel="noopener noreferrer">Guideline</a>
            <a href="../pages/contact.html" class="text-link" target="_blank" rel="noopener noreferrer">Contact</a>
        </div>
    
        <footer>
            © 2026 <a href="https://x.com/utaubutter" target="_blank" rel="noopener noreferrer">utaubutter</a>
        </footer>
        
    </main>

</body>
</html>
