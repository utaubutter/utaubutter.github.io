<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Himeya Anna — Butter</title>
    <link rel="stylesheet" href="../style-v2.css">
</head>
<body>

    <main class="glass">
        <a class="back" href="voicebank.html">← Voicebank</a>

<div class="character">
    <div class="character-image">
        <span>追加予定</span>
        <!-- 後で立ち絵を入れる -->
    </div>

    <div class="character-info">
        <h1>姫矢杏菜</h1>
        <p class="roman">Himeya Anna</p>

        <div class="info-row">
            <h2>Format</h2>
            <div class="info-value"><p>VCV</p><span>単音階連続音</span></div>
        </div>
        <div class="info-row">
            <h2>Recording</h2>
            <div class="info-value"><p>2019</p></div>
        </div>

        <section class="buttons">
            <a href="javascript:void(0);" id="sample-btn">
                <span>Sample</span>
            </a>
            <a href="#">
                <span>Download</span>
                <small>追加予定</small>
            </a>
        </section>

<div class="mini-player" id="mini-player">
    <audio id="audio-player" src="../assets/audio/anna-sample.wav"></audio>
    <button class="player-btn" id="play-pause-btn">▶</button>

    <div class="player-info">
        <span class="player-title">アルカリレットウセイ</span>
        <small class="player-credit">曲：かいりきベア<br>UST：亜鉛</small>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </div>
</div>

    </div>
</div>

<section class="profile-section">
    <h2>Profile</h2>
    <p class="coming">追加予定</p>
</section>

<div class="character-links">
    <a href="../pages/guideline.html" class="text-link" target="_blank" rel="noopener noreferrer">Guideline</a>
    <a href="../pages/contact.html" class="text-link" target="_blank" rel="noopener noreferrer">Contact</a>
</div>
       
        <footer>
            © 2026 <a href="https://x.com/utaubutter" target="_blank" rel="noopener noreferrer">utaubutter</a>
        </footer>
        
    </main>

<script>
const sampleBtn = document.getElementById('sample-btn');
const miniPlayer = document.getElementById('mini-player');
const audio = document.getElementById('audio-player');
const playPauseBtn = document.getElementById('play-pause-btn');
const progressFill = document.getElementById('progress-fill');
// ★ 進行バーの親要素（クリックイベント用）を取得
const progressBar = document.querySelector('.progress-bar'); 

let delayTimer = null; // ★ ディレイ用のタイマーを記憶する変数

// Sampleボタン（上の大きなボタン）を押した時の処理
sampleBtn.addEventListener('click', () => {
    if (miniPlayer.style.display === 'none' || miniPlayer.style.display === '') {
        miniPlayer.style.display = 'flex';
        playPauseBtn.textContent = '▶';
    } else {
        // 閉じるときはタイマーも音も完全にリセット
        clearTimeout(delayTimer);
        audio.pause();
        audio.currentTime = 0; 
        miniPlayer.style.display = 'none';
        progressFill.style.width = '0%';
    }
});

// プレイヤー側の丸い再生・一時停止ボタンを押した時の処理
playPauseBtn.addEventListener('click', () => {
    if (audio.paused) {
        // ★ すでにタイマーが動いていたら一旦クリア（連打対策）
        clearTimeout(delayTimer); 
        
        // ★ 再生ボタンを押して「2秒後」に再生する設定（2000ms = 2秒）
        // 待機中であることが分かるように、ボタンを一時的に「⏳」などにしても可愛いですよ！
        playPauseBtn.textContent = '⏳'; 
        
        delayTimer = setTimeout(() => {
            audio.play();
            playPauseBtn.textContent = '❚❚';
        }, 2000); // ⏱️ ここを変えれば何秒後でも調整できます（例: 1秒なら 1000）
        
    } else {
        // 一時停止の時はタイマーをクリアしてすぐ止める
        clearTimeout(delayTimer);
        audio.pause();
        playPauseBtn.textContent = '▶';
    }
});

// ★ 再生バーをクリックして好きな位置から再生する機能
progressBar.style.cursor = 'pointer'; // マウスを乗せたらポインタを指マークにする
progressBar.addEventListener('click', (e) => {
    // 全体の長さに対して、クリックされた位置が何パーセントかを計算
    const coordX = e.offsetX;
    const totalWidth = progressBar.clientWidth;
    const clickPercent = coordX / totalWidth;
    
    // 音声の再生位置を、クリックされた位置の時間にジャンプさせる
    audio.currentTime = clickPercent * audio.duration;
});

// 音声の再生位置に合わせてバーを伸ばす
audio.addEventListener('timeupdate', () => {
    if (audio.duration) {
        const progress = (audio.currentTime / audio.duration) * 100;
        progressFill.style.width = `${progress}%`;
    }
});

// 曲が最後まで終わったら自動で最初の状態に戻す
audio.addEventListener('ended', () => {
    audio.currentTime = 0;
    playPauseBtn.textContent = '▶';
    progressFill.style.width = '0%';
});
</script>

</body>
</html>
