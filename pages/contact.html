<!DOCTYPE html>

<main class="glass">

    <div class="contact-content">
        <section class="contact-section">
            <h2>お問い合わせについて</h2>
            <p>音源に関するご相談、oto.ini改変のご連絡、その他のお問い合わせは、以下の窓口よりお気軽にご連絡ください。</p>

            <h2>X (Twitter)</h2>

                <a class="text-link" href="https://x.com/utaubutter" target="_blank" rel="noopener noreferrer">@utaubutter</a>

        <section class="contact-section">

            <p>
                <!-- 💡 フォームのURLやメールアドレス（mailto:〜）を href に入れてください -->
                <a class="text-link" href="#" target="_blank" rel="noopener noreferrer">お問い合わせ窓口はこちら</a>

            <p><small style="color: #9ca3af; font-size: 0.8rem;">※メッセージに気づかない可能性があるため、件名に「UTAU」や「音源名」など、ご用件がわかるキーワードの記載をお願いいたします。</small></p>
